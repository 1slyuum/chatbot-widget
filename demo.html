<h1>Tay Travels widget test</h1>
<p>This is a bare page with no extra CSS, no transforms, no other scripts — just to confirm the widget itself mounts correctly bottom-right.</p>
<p>Open DevTools (F12) → Elements tab → confirm there is exactly ONE <code>#ttc-widget-root</code> in the DOM.</p>

<!-- Tay Travels AI Chat Widget -->
<link rel="stylesheet" href="https://1slyuum.github.io/chatbot-widget/chatbot-travel.css">
<script src="https://1slyuum.github.io/chatbot-widget/chatbot-travel.js"></script>
<script>
  TayTravelsChatbot.init({
    agencyName: 'Tay Travels',
    assistantName: 'Taje',
    webhook: 'https://islempharm.app.n8n.cloud/webhook/travel-chatbot',
    theme: { primary: '#1E255D', accent: '#D50032' },
    welcomeMessage: "Hi! I\u2019m Taje\u2019s assistant \u2014 where would you like to go?",
    suggestedQuestions: ['Show me vacation deals', "I\u2019d like a cruise recommendation", 'Help me plan a trip'],
    position: 'bottom-right'
